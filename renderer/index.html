<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'"
    />
    <link rel="stylesheet" href="styles.css" />
    <title>DeadlineAura</title>
  </head>
  <body>
    <div class="sidebar">
      <div class="clock-section">
        <div class="clock-time" id="clock">--:--</div>
        <div class="clock-date" id="clockDate"></div>
      </div>

      <div class="shift-countdown" id="shiftCountdown" style="display: none">
        <span class="shift-label" id="shiftLabel"></span>
        <span class="shift-time" id="shiftTime">--:--</span>
      </div>

      <div class="urgency-section">
        <div class="urgency-bar-container">
          <div class="urgency-bar-fill" id="urgencyBar"></div>
        </div>
        <div class="urgency-meta">
          <span id="urgencyLabel">--</span>
          <span id="urgencyScore">0.00</span>
        </div>
      </div>

      <div class="ai-notes-panel" id="aiNotesPanel">
        <div class="clinical-note" id="clinicalNote"></div>
        <div class="stress-forecast" id="stressForecast"></div>
      </div>

      <div class="divider"></div>

      <div class="tasks-container" id="tasksContainer">
        <div class="empty-state" data-i18n="sidebar.no_tasks">Nessun task in arrivo</div>
      </div>

      <div class="sidebar-footer">
        <button class="footer-btn" id="btnConfig" data-i18n-title="common.config" title="Config">
          &#9881;
        </button>
        <button
          class="footer-btn footer-btn--text"
          id="btnLayout"
          data-i18n-title="common.layout"
          data-i18n="common.layout"
          title="Layout"
        >
          Layout
        </button>
        <span class="footer-spacer"></span>
        <span class="sync-status" id="syncStatus">--</span>
        <button class="footer-btn" id="btnSync" data-i18n-title="common.sync" title="Sync">
          &#8635;
        </button>
        <button
          class="footer-btn footer-btn--close"
          id="btnClose"
          data-i18n-title="common.close"
          title="Chiudi"
        >
          &#10005;
        </button>
      </div>
    </div>

    <script src="i18n-renderer.js"></script>
    <script src="sidebar-utils.js"></script>
    <script src="shift-countdown.js"></script>
    <script src="sidebar.js"></script>
  </body>
</html>
