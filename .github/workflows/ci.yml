name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential \
            libcairo2-dev \
            libpango1.0-dev \
            libjpeg-dev \
            libgif-dev \
            librsvg2-dev

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules
        run: npm rebuild

      - name: Lint
        run: npm run lint

      - name: Test with JUnit output
        if: always()
        run: npx vitest run --reporter=junit --outputFile=test-results.xml

      - name: Coverage
        if: always()
        run: npm run test:coverage

      - name: Generate test badge
        if: always()
        run: |
          python3 -c "
          import json, xml.etree.ElementTree as ET, os
          if not os.path.exists('test-results.xml'):
              badge = {'schemaVersion': 1, 'label': 'tests', 'message': 'N/A', 'color': 'lightgrey'}
          else:
              root = ET.parse('test-results.xml').getroot()
              suites = root.findall('testsuite') if root.tag == 'testsuites' else [root]
              tests = sum(int(s.attrib.get('tests', 0)) for s in suites)
              failures = sum(int(s.attrib.get('failures', 0)) for s in suites)
              errors = sum(int(s.attrib.get('errors', 0)) for s in suites)
              passed = tests - failures - errors
              badge = {
                  'schemaVersion': 1,
                  'label': 'tests',
                  'message': f'{passed}/{tests} passed' if failures + errors > 0 else f'{passed} passed',
                  'color': 'red' if failures + errors > 0 else 'brightgreen'
              }
          with open('badges/test-badge.json', 'w') as f:
              json.dump(badge, f)
          "

      - name: Generate coverage badge
        if: always()
        run: |
          python3 -c "
          import json, os
          summary_path = 'coverage/coverage-summary.json'
          if not os.path.exists(summary_path):
              badge = {'schemaVersion': 1, 'label': 'coverage', 'message': 'N/A', 'color': 'lightgrey'}
          else:
              with open(summary_path) as f:
                  data = json.load(f)
              pct = data['total']['lines']['pct']
              pct_float = float(pct)
              color = 'brightgreen' if pct_float >= 90 else 'green' if pct_float >= 80 else 'yellow' if pct_float >= 60 else 'red'
              badge = {'schemaVersion': 1, 'label': 'coverage', 'message': f'{pct}%', 'color': color}
          with open('badges/coverage-badge.json', 'w') as f:
              json.dump(badge, f)
          "

      - name: Commit badges
        if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/test-badge.json badges/coverage-badge.json
          git diff --cached --quiet || git commit -m "ci: update badges [skip ci]"
          git push
